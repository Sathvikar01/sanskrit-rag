# SRAG Configuration
# Sanskrit RAG with Knowledge Graph + Linguistic Re-ranking

project:
  name: SRAG
  description: "Sanskrit RAG with Graph-Enhanced Linguistic Re-ranking"
  version: "0.1.0"

# Data paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  evaluation_dir: "data/evaluation"
  xml_main: "data/raw/dataset.xml"
  xml_morpho: "data/raw/dataset.lemma-morphosyntax.xml"
  xml_segmentation: "data/raw/dataset.segmentation-lemma.xml"
  chunks_file: "data/processed/chunks.jsonl"
  graph_import_dir: "data/processed/graph_import"
  embeddings_dir: "data/processed/embeddings"
  faiss_index: "data/processed/embeddings/verse_vectors.faiss"
  faiss_metadata: "data/processed/embeddings/verse_metadata.json"

# Preprocessing
preprocessing:
  chunk_strategy: "verse_commentary"  # verse_commentary | verse_only | sliding_window
  include_lemmas: true
  include_morpho: true
  iast_to_devanagari: true

# Embedding model
embedding:
  model_name: "sanganaka/bge-m3-sanskritFT"
  device: "cpu"  # cpu | cuda
  batch_size: 8
  max_length: 256
  normalize: true
  query_prefix: ""  # BGE models sometimes need query prefix

# Neo4j
neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "srag_password"
  database: "neo4j"

# Retrieval
retrieval:
  vector_top_k: 50
  graph_top_k: 50
  bm25_top_k: 50
  fusion_method: "rrf"  # rrf | weighted
  rrf_k: 60

# Re-ranking
reranking:
  top_n: 5
  method: "weighted"  # weighted | lambdamart
  weights:
    score_vector: 0.20
    score_graph: 0.15
    score_bm25: 0.10
    score_lemma: 0.15
    score_morph: 0.15
    score_compound: 0.05
    score_commentary: 0.10
    score_concept: 0.05
    score_graph_centrality: 0.05

# Generation
generation:
  provider: "mimo"  # mimo | gemini
  mimo:
    api_base: "https://api.xiaomimimo.com/v1"
    model: "mimo-v2.5"
    max_tokens: 2048
    temperature: 0.3
  gemini:
    model: "gemini-2.0-flash"
    max_tokens: 2048
    temperature: 0.3

# Query processing
query_processing:
  provider: "mimo"
  extract_concepts: true
  convert_to_iast: true

# Evaluation
evaluation:
  metrics: ["mrr", "ndcg@5", "ndcg@10", "recall@5", "recall@10"]
  test_queries_file: "data/evaluation/test_queries.json"

# Confidence
confidence:
  enable_platt_scaling: false  # Enable after collecting calibration data
  sigmoid_temperature: 1.0
  pipeline_weights:
    retrieval: 0.3
    reranking: 0.5
    generation: 0.2
