# SRAG Configuration
# Sanskrit RAG with Knowledge Graph + Linguistic Re-ranking

project:
  name: SRAG
  description: "Sanskrit RAG with Graph-Enhanced Linguistic Re-ranking"
  version: "0.2.0"

# Data paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  evaluation_dir: "data/evaluation"
  xml_main: "data/raw/dataset.xml"
  xml_morpho: "data/raw/dataset.lemma-morphosyntax.xml"
  xml_segmentation: "data/raw/dataset.segmentation-lemma.xml"
  chunks_file: "data/processed/chunks.jsonl"
  graph_import_dir: "data/processed/graph_import"
  embeddings_dir: "data/processed/embeddings"
  faiss_index: "data/processed/embeddings/verse_vectors.faiss"
  faiss_metadata: "data/processed/embeddings/verse_metadata.json"

# Preprocessing
preprocessing:
  chunk_strategy: "verse_commentary"
  include_lemmas: true
  include_morpho: true
  iast_to_devanagari: true

# Embedding model
embedding:
  model_name: "sanganaka/bge-m3-sanskritFT"
  device: "cpu"
  batch_size: 8
  max_length: 256
  normalize: true
  query_prefix: ""

# Neo4j
neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "srag_password"
  database: "neo4j"

# Retrieval
retrieval:
  vector_top_k: 50
  graph_top_k: 50
  bm25_top_k: 50
  fusion_method: "rrf"
  rrf_k: 60
  adaptive_weights: true

# Re-ranking
reranking:
  top_n: 15
  method: "weighted"
  adaptive: true
  normalize: "minmax"  # Options: "none", "minmax", "l2", "zscore"
  weights:
    score_vector: 0.40
    score_graph: 0.20
    score_bm25: 0.10
    score_lemma: 0.12
    score_morph: 0.08
    score_compound: 0.03
    score_commentary: 0.04
    score_concept: 0.02
    score_graph_centrality: 0.01

# Adaptive weight profiles by query type
adaptive_profiles:
  concept_short:
    description: "Short definitional queries like 'What is dharma?'"
    retrieval: [0.50, 0.30, 0.20]
    reranking:
      score_vector: 0.45
      score_graph: 0.20
      score_bm25: 0.05
  factual_short:
    description: "Short factual queries"
    retrieval: [0.35, 0.40, 0.25]
    reranking:
      score_vector: 0.35
      score_graph: 0.30
      score_bm25: 0.08
  complex_long:
    description: "Long complex queries"
    retrieval: [0.40, 0.20, 0.40]
    reranking:
      score_vector: 0.35
      score_graph: 0.15
      score_bm25: 0.20
  concept_medium:
    description: "Medium concept queries"
    retrieval: [0.45, 0.30, 0.25]
    reranking:
      score_vector: 0.40
      score_graph: 0.22
      score_bm25: 0.08
  general_medium:
    description: "General medium queries"
    retrieval: [0.45, 0.25, 0.30]
    reranking:
      score_vector: 0.40
      score_graph: 0.18
      score_bm25: 0.12

# Generation
generation:
  provider: "mimo"
  mimo:
    api_base: "https://api.xiaomimimo.com/v1"
    model: "mimo-v2.5"
    max_tokens: 2048
    temperature: 0.3
  gemini:
    model: "gemini-2.0-flash"
    max_tokens: 2048
    temperature: 0.3

# Query processing
query_processing:
  provider: "mimo"
  extract_concepts: true
  convert_to_iast: true

# LangGraph
langgraph:
  enabled: true
  max_iterations: 2
  confidence_threshold: 0.3
  expand_query_on_low_confidence: true

# Evaluation
evaluation:
  metrics: ["mrr", "ndcg@5", "ndcg@10", "recall@5", "recall@10"]
  test_queries_file: "data/evaluation/test_queries.json"
  sample_size: 100

# Confidence
confidence:
  enable_platt_scaling: false
  sigmoid_temperature: 1.0
  pipeline_weights:
    retrieval: 0.3
    reranking: 0.5
    generation: 0.2
